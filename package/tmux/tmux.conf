set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'
set -ga terminal-overrides ",$TERM:Tc"
set -g default-shell "${SHELL}"
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g renumber-windows on

# status bar
set -g status-style fg=colour251,bg=colour236
set -g status-left-length 32
set -g status-left  "#[fg=colour0,bg=colour4]  \uf009 #S  #[bg=default] "
set -g status-right "#[fg=colour251,bg=colour238]  \uf073 %Y/%m/%d  #[fg=colour147]\ue384 %H:%M:%S  #[fg=colour79]󰍹 #h  #[default]"
set -g window-status-format         "#[fg=colour251,bg=colour239]  #I #W#{?@workmux_status, #{@workmux_status},}  #[bg=default] "
set -g window-status-current-format "#[fg=colour0,bg=colour2]  #I  #[fg=colour251,bg=colour238] #W#{?@workmux_status, #{@workmux_status},}  #[bg=default] "
set -g window-status-separator ""
set -g window-style bg=colour236
set -g window-active-style bg=terminal

# set the status bar position
set -g status-position top
set -g status-interval 1

# pane border
set -g pane-border-status top
set -g pane-border-lines single
set -g pane-border-format "#("$XDG_CONFIG_HOME/tmux/pane-border-format.bash")"

# enable mouse controll
set -g mouse on

# use vi key bindings in copy-mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel

# key bindings
unbind C-b
set-option -g prefix C-g

unbind Up
unbind Down
unbind Left
unbind Right

bind r source-file "$HOME/.tmux.conf" \; display "config reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -v -c "#{pane_current_path}"
bind C-w kill-window
bind -r n next-window
bind -r p previous-window
bind -r h if-shell -F "#{pane_at_left}"   "" "select-pane -L"
bind -r j if-shell -F "#{pane_at_bottom}" "" "select-pane -D"
bind -r k if-shell -F "#{pane_at_top}"    "" "select-pane -U"
bind -r l if-shell -F "#{pane_at_right}"  "" "select-pane -R"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind / copy-mode \; command-prompt -p "(search down)" "send -X search-forward \"%%%\""
bind - split-window -v -c "#{pane_current_path}"
bind C-u copy-mode \; send -X search-forward "(https?://|git@|git://|ssh://|ftp://|file:///)[[:alnum:]?=%/_.:,;~@!#$&()*+-]*"
bind C-i copy-mode \; send -X search-forward "[[:digit:]]{1,3}\.[[:digit:]]{1,3}\.[[:digit:]]{1,3}\.[[:digit:]]{1,3}"

bind-key -n C-S-Left swap-window -d -t -1
bind-key -n C-S-Right swap-window -d -t +1

# popup
bind i display-popup -h90% -w90% -E "workmux dashboard"

# tmux-fzf
set -g @plugin 'sainnhe/tmux-fzf'

# tmux-sessionx
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

# tpm
run '~/.tmux/plugins/tpm/tpm'
